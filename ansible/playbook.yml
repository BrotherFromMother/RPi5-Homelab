---
- name: Konfiguracja i Orkiestracja Raspberry Pi 5
  hosts: rpi5
  become: yes

  tasks:
    - name: System update i upgrade
      apt:
        update_cache: yes
        upgrade: dist

    - name: Instalacja bibliotek Pythona dla Dockera
      apt:
        name:
          - python3-pip
          - python3-docker
        state: present

    - name: Stworz siec homelab_network
      docker_network:
        name: homelab_network
        state: present

    - name: Ustaw uprawnienia dla folderu danych Passbolt (UID 33 = www-data)
      ansible.builtin.file:
        path: "/home/pi/Git/RPi5-Homelab/docker/passbolt/data"
        owner: "33"
        group: "33"
        mode: "0775"
        recurse: yes
        state: directory

    - name: Wdrozenie uslug Docker Compose
      community.docker.docker_compose_v2:
        project_src: "/home/pi/Git/RPi5-Homelab/docker/{{ item }}"
        state: present
      loop:
        - samba-ad
   #     - radius
        - zabbix
        - homarr
    #    - passbolt

    - name: Czyszczenie nieuzywanych obrazow Docker
      docker_prune:
        images: yes
        images_filters:
          dangling: false
