networks:
  gitea-network:
    external: false

services:
  server:
    image: gitea/gitea:1.21.5
    container_name: gitea-srv
    restart: always
    network_mode: "service:tailscale"
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - GITEA__database__DB_TYPE=postgres
      - GITEA__database__HOST=db:5432
      - GITEA__database__NAME=gitea
      - GITEA__database__USER=gitea
      - GITEA__database__PASSWD=GiteaBezpieczne2026!
    volumes:
      - ./gitea-data:/data
    depends_on:
      - db
      - tailscale

  db:
    image: postgres:15-alpine
    container_name: gitea-db
    restart: always
    environment:
      - POSTGRES_USER=gitea
      - POSTGRES_PASSWORD=GiteaBezpieczne2026!
      - POSTGRES_DB=gitea
    networks:
      - gitea-network
    volumes:
      - ./gitea-db:/var/lib/postgresql/data

  tailscale:
    image: tailscale/tailscale:latest
    container_name: gitea-tailscale
    hostname: gitea-lab
    restart: always
    environment:
      - TS_AUTHKEY=tskey-auth-kRa2QPk36821CNTRL-xgXQ744dncRbi9rQyMeucRQ1CZgFniXBS
      - TS_STATE_DIR=/var/lib/tailscale
    volumes:
      - ./gitea-tailscale-state:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    networks:
      - gitea-network
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    ports:
      - "3000:3000"
      - "2222:22"
