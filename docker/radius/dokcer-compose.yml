services:
  radius:
    image: freeradius/freeradius-server:latest
    container_name: freeradius-server
    restart: always
    volumes:
      - ./config/clients.conf:/etc/raddb/clients.conf:ro
      - ../samba-ad/data:/var/lib/samba:ro 
    networks:
      macvlan_net:
        ipv4_address: 192.168.8.201

networks:
  macvlan_net:
    external: true
    name: homelab_macvlan
